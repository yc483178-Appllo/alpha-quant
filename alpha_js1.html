function genStratLib() {
  const lib = [];
  let idx = 1;
  for(const tp of window.STRAT_TYPES) {
    const names = window.STRAT_NAMES[tp];
    for(let v=0;v<10;v++) {
      const gen = 20 + Math.floor(Math.random()*23);
      const fit = parseFloat((4 + Math.random()*5.5).toFixed(2));
      const ret = parseFloat((6 + Math.random()*16).toFixed(2));
      const sharpe = parseFloat((0.8 + Math.random()*1.8).toFixed(2));
      const dd = parseFloat((3 + Math.random()*9).toFixed(2));
      const wr = parseFloat((48 + Math.random()*28).toFixed(1));
      const trades = 80 + Math.floor(Math.random()*300);
      const status = fit > 8 ? 'active' : fit > 6 ? 'standby' : 'retired';
      const nm = names[v%names.length];
      const matchedStocks = window.ALL_STOCKS.sort(()=>Math.random()-.5).slice(0,3).map(s=>s.slice(0,6));
      lib.push({
        id: `${tp.substring(0,3).toUpperCase()}-${String(idx).padStart(3,'0')}`,
        type:tp, name:nm+(v>0?`-v${v+1}`:''), gen, fit, ret, sharpe, dd, wr, trades, status,
        matchedStocks, params:{lookback:10+v*5, threshold:0.01+v*0.005, regime_filter: v%2===0},
        created:`2025-${String(Math.ceil(Math.random()*12)).padStart(2,'0')}-${String(10+Math.floor(Math.random()*18)).padStart(2,'0')}`
      });
      idx++;
    }
  }
  return lib.sort((a,b)=>b.fit-a.fit);
}

function genTradeHistory() {

  const dirs=['买入','卖出'];
  const r=[];
  for(let i=0;i<180;i++){
    const idx=i%codes.length;
    const d=new Date(Date.now()-i*86400000);
    r.push({
      time:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`,
      code:codes[idx],name:names[idx],
      dir:dirs[Math.floor(Math.random()*2)],
      price:parseFloat((80+Math.random()*200).toFixed(2)),
      qty:100*Math.ceil(Math.random()*10),
      strategy:strats[Math.floor(Math.random()*strats.length)],
      regime:regimes[Math.floor(Math.random()*3)],
      pnl:parseFloat(((Math.random()-.4)*8).toFixed(2))
    });
  }
  return r;
}
